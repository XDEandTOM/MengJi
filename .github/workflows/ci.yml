name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Frontend test
        run: npm run test:run

      - name: Go vet
        run: cd server-go && go vet ./... 2>&1 || true
        continue-on-error: true

      - name: Go test
        run: cd server-go && go test -v ./... -count=1 -timeout 120s

      - name: Build
        run: npm run build
