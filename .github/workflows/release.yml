name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend to server
        run: cp -r dist server-go/

      - name: Build Go binaries
        run: |
          cd server-go
          GOOS=linux GOARCH=amd64 go build -o suisui-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o suisui-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o suisui-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o suisui-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o suisui-windows-amd64.exe .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: server-go/suisui-*
